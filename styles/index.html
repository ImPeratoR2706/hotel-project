<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отель - Карточка номера</title>
    <link rel="stylesheet" href="room-card.css">
</head>
<body>

    <div class="room-card">
        <div class="room-card__image">
            <!-- Заглушка для фото -->
            <div style="width:100%; height:200px; background:#ddd; display:flex; align-items:center; justify-content:center;">Фото номера</div>
        </div>
        <div class="room-card__content">
            <h2 class="room-card__title">Люкс с видом на море</h2>
            <p class="room-card__description">
                Просторный номер с панорамными окнами, завтраком и доступом в спа-зону.
            </p>
            <div class="room-card__price">15 000 ₽ / ночь</div>
            <button class="room-card__button">Забронировать</button>
        </div>
    </div>

</body>
</html>
